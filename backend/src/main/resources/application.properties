server.port=8081
spring.application.name=simba-market-backend

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/simba?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=12345

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Security Configuration
# By default, we'll permit all for initial development and then secure it
spring.security.user.name=admin
spring.security.user.password=admin123
